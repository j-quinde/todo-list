    <div class="group-form">
        <form id="form-crear-tarea" method="post" action="{% url 'crear-tarea' %}">

            <div class="form-item">
{#                <label for="id_titulo">{{ form.titulo.label }}</label>#}
                <label for="id_titulo">Título:</label>
                {{ form.titulo }}
            </div>

                <label for="id_descripcion">Descripción:</label>
                {{ form.descripcion }}

            <div class="form-item">
                <label for="id_completo" class="checkbox">{{ form.completo }} <span class="box"></span> {{ form.completo.label }}</label>

            <input class="button" type="submit" value="Guardar" onclick="confirm_save(event, this)">
        </form>
