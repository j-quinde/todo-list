{% extends 'base/base.html' %}
{% block content %}
    <div class="auth-wrapper">
        <div class="auth-container">
            <h1>Regístrate</h1>

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username" class="form-label">Nombre de usuario</label>
                    {{ form.username }}
                </div>
                <div class="form-group">
                    <label for="id_password1" class="form-label">Contraseña</label>
                    {{ form.password1 }}
                </div>
                <div class="form-group">
                    <label for="id_password2" class="form-label">Confirmar contraseña</label>
                    {{ form.password2 }}
                </div>
                <input class="button btn-login" type="submit" value="Registrar">
            </form>

            <p>¿Ya tienes una cuenta? <a href="{% url 'login' %}">Ingresa</a></p>
        </div>
    </div>
{% endblock content %}
