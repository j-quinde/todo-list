{% extends 'base/base.html' %}
{% block content %}
    <h1>Regístrate</h1>

    <form method="post">
        {% csrf_token %}
        <label>{{ form.username.label }}</label> {{ form.username }}
        <label>{{ form.password1.label }}</label> {{ form.password1 }}
        <label>{{ form.password2.label }}</label> {{ form.password2 }}
        <input type="submit" value="Registrar">
    </form>

    <p>¿Ya tienes una cuenta? <a href="{% url 'login' %}">Ingresa</a></p>
{% endblock content %}
