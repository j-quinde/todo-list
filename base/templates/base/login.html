{% extends 'base/base.html' %}
{% block content %}
    <div class="auth-wrapper">
        <div class="auth-container">
            <h1>Login</h1>

            <form method="post">
                {% csrf_token %}
                {#            {{ form.as_p }}#}
                <div class="form-group">
                    <label for="id_username" class="form-label">Usuario</label>
                    {{ form.username }}
                </div>
                <div class="form-group">
                    <label for="id_password" class="form-label">Contraseña</label>
                    {{ form.password }}
                </div>

                <input class="button btn-login" type="submit" value="Ingresar">
            </form>

            <p class="">¿No tienes una cuenta? <a href="{% url 'registro' %}">Regístrate</a></p>
        </div>
    </div>
{% endblock content %}
